suite: defaults
templates:
  - templates/sts-coordinator.yaml
  - templates/sts-tablet.yaml

tests:
  - it: should not render envFrom by default on coordinator
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].envFrom
        template: templates/sts-coordinator.yaml

  - it: should not render envFrom by default on tablet
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].envFrom
        template: templates/sts-tablet.yaml

---

suite: coordinator env
templates:
  - templates/sts-coordinator.yaml

tests:
  - it: should render envFrom with secretRef on coordinator
    set:
      coordinator.envFrom:
        - secretRef:
            name: my-eso-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: my-eso-secret

  - it: should render envFrom with configMapRef on coordinator
    set:
      coordinator.envFrom:
        - configMapRef:
            name: my-config
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: my-config

  - it: should render extraEnv on coordinator
    set:
      coordinator.extraEnv:
        - name: AWS_REGION
          value: us-east-1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AWS_REGION
            value: us-east-1

  - it: should not apply tablet env to coordinator
    set:
      tablet.envFrom:
        - secretRef:
            name: tablet-secret
      tablet.extraEnv:
        - name: TABLET_ONLY
          value: "true"
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].envFrom
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: TABLET_ONLY
            value: "true"

---

suite: tablet env
templates:
  - templates/sts-tablet.yaml

tests:
  - it: should render envFrom with secretRef on tablet
    set:
      tablet.envFrom:
        - secretRef:
            name: my-eso-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: my-eso-secret

  - it: should render envFrom with configMapRef on tablet
    set:
      tablet.envFrom:
        - configMapRef:
            name: my-config
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: my-config

  - it: should render extraEnv on tablet
    set:
      tablet.extraEnv:
        - name: AWS_REGION
          value: us-east-1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AWS_REGION
            value: us-east-1

  - it: should render multiple envFrom sources on tablet
    set:
      tablet.envFrom:
        - secretRef:
            name: secret-one
        - secretRef:
            name: secret-two
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: secret-one
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: secret-two

  - it: should not apply coordinator env to tablet
    set:
      coordinator.envFrom:
        - secretRef:
            name: coordinator-secret
      coordinator.extraEnv:
        - name: COORDINATOR_ONLY
          value: "true"
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].envFrom
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: COORDINATOR_ONLY
            value: "true"
