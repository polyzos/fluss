name: Docker

# Note: The `apache/fluss-quickstart-flink` image is NOT built by this workflow.
# That image bundles `fluss-flink-*` and `fluss-fs-s3` jars downloaded from a
# Maven repository, and Fluss does not currently publish those artifacts to the
# ASF snapshot repository. It is therefore built and pushed manually by the
# release manager — see `docker/quickstart-flink/README.md` and the release
# guide (`website/community/how-to-release/creating-a-fluss-release.mdx`).

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-fluss:
    name: "Build and Push apache/fluss"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Fluss distribution
        run: ./mvnw -T 1C -B clean package -pl fluss-dist -am -DskipTests -Dgpg.skip -Dcheckstyle.skip=true

      - name: Prepare Docker build context
        run: |
          FLUSS_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "FLUSS_VERSION=${FLUSS_VERSION}" >> $GITHUB_ENV
          rm -rf docker/fluss/build-target/
          mkdir -p docker/fluss/build-target/
          cp -r fluss-dist/target/fluss-${FLUSS_VERSION}-bin/fluss-${FLUSS_VERSION}/* docker/fluss/build-target/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine Docker image tag
        id: tags
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Strip the 'v' prefix from the tag (e.g. v0.9.1-incubating -> 0.9.1-incubating)
            VERSION="${GITHUB_REF_NAME#v}"
            echo "tags=apache/fluss:${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "tags=apache/fluss:latest-snapshot" >> $GITHUB_OUTPUT
          fi

      - name: Build and push apache/fluss
        uses: docker/build-push-action@v6
        with:
          context: docker/fluss
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
